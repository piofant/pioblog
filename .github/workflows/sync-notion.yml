name: Sync Notion → blog

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Opt-in to Node 24 runtime for JS actions (default June 2026; silences deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: sync-notion
  cancel-in-progress: false

permissions:
  contents: write
  actions: write   # required for `gh workflow run "Deploy to GitHub Pages"` step below

jobs:
  sync:
    runs-on: ubuntu-latest
    # Требует в Settings → Secrets:
    #   NOTION_TOKEN — Internal Integration Secret
    # Если секрет не выставлен — job сам себя завершает без ошибок.
    steps:
      - name: Check secret
        id: check
        run: |
          if [ -z "${{ secrets.NOTION_TOKEN }}" ]; then
            echo "::notice::NOTION_TOKEN not configured; skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
      - if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json
      - if: steps.check.outputs.skip == 'false'
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - if: steps.check.outputs.skip == 'false'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: cd scripts && node sync-notion.js
      - if: steps.check.outputs.skip == 'false'
        id: commit
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "notion-sync-bot@users.noreply.github.com"
          git add src/content/pages/ public/img/notion/ || true
          if git diff --cached --quiet; then
            echo "::notice::No Notion changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "sync: notion $(date -u +%Y-%m-%dT%H:%MZ)"
          # stash any leftover unstaged (npm/log noise) so rebase doesn't refuse
          git stash --include-untracked --quiet || true
          git pull --rebase origin main
          git stash pop --quiet 2>/dev/null || true
          git push
          echo "changed=true" >> $GITHUB_OUTPUT
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --repo ${{ github.repository }} --ref main

name: Sync Telegram → blog

on:
  schedule:
    - cron: '*/30 * * * *'   # каждые 30 минут
  workflow_dispatch:

# Opt-in to Node 24 runtime for JS actions (default June 2026; silences deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: sync-telegram
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json
      - name: Install deps
        working-directory: scripts
        run: npm ci --no-audit --no-fund
      - name: Pull channel updates via Bot API
        env:
          TG_CHANNEL: pioblog
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: cd scripts && node sync-telegram.js
      - name: Auto-tag posts without tags (LLM)
        # Идемпотентно: пропускает посты у которых tags уже есть.
        # LLM-теггер заменил regex-suggest-tags.mjs — тот ставил ложноположительные
        # теги на упоминания в перечислении (см. llm-tag.mjs header).
        env:
          OR_LLM_API_KEY: ${{ secrets.OR_LLM_API_KEY }}
        run: node scripts/llm-tag.mjs --all-missing
      - name: Commit new posts
        id: commit
        run: |
          git config user.name "tg-sync-bot"
          git config user.email "tg-sync-bot@users.noreply.github.com"
          # Восстанавливаем любые случайные правки вне sync-зоны (lock-файлы и т.п.),
          # иначе rebase ниже падает с "You have unstaged changes".
          git checkout -- . 2>/dev/null || true
          git add src/content/blog/ public/img/tg/ || true
          if git diff --cached --quiet; then
            echo "::notice::No new TG posts"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "sync: telegram $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push
          echo "changed=true" >> $GITHUB_OUTPUT
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages" --repo ${{ github.repository }} --ref main
